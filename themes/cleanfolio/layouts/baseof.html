<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode `en` }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <nav>
    {{ partial "nav.html" . }}
  </nav>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
  <script>
    (function() {
      var path = window.location.pathname;
      document.querySelectorAll("nav button").forEach(function(btn) {
        var name = btn.textContent.trim().toLowerCase();
        var base = path.split("/")[1] || "";
        if ((base === "" && name === "home") || base === name) {
          btn.classList.add("active");
        }
      });
    })();
  </script>
</body>
</html>
